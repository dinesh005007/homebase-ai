models:
  fast:
    name: qwen2.5:1.5b
    roles: [classifier, extractor, entity-linker]
    timeout: 30
  reason:
    name: qwen2.5:1.5b
    roles: [rag, general]
    timeout: 120
  reason-large:
    name: qwen2.5:7b
    roles: []
    timeout: 300
  vision:
    name: llava:13b
    roles: [vision]
    timeout: 90
  embed:
    name: nomic-embed-text
    roles: [embedding]
    timeout: 30
    dimensions: 768

# For 8GB RAM / CPU-only machines, use qwen2.5:1.5b for everything.
# Switch reason to qwen2.5:7b when you have more RAM or GPU.
defaults:
  classifier: fast
  extractor: fast
  entity-linker: fast
  rag: reason
  vision: vision
  embedding: embed
